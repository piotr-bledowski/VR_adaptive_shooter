behaviors:
  ShooterFlow:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3 # entropy regularisation (exploration)
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      # LSTM for sequence modelling — remembers event history across steps
      memory:
        memory_size: 128
        sequence_length: 16

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 500000
    time_horizon: 64
    summary_freq: 5000

    # Multi-discrete actions: [spawn?, type(3), x(5), z(3), y(3)]
    # Observation size: 54 (4 global + 10 events × 5 features)

# Environment settings
environment_parameters:
  # These can be varied via curriculum later
  round_duration: 30.0
  ideal_target_count: 3.0
